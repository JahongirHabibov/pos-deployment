# Point of Sale System - Production Deployment
#
# Prerequisites on the server:
#   1. docker login ghcr.io -u <technical-user> -p <PAT>
#   2. cp .env.example .env && nano .env   (set IMAGE_* tags and credentials)
#
# Start: docker compose -f docker-compose.prod.yml up -d
# Stop:  docker compose -f docker-compose.prod.yml down

name: point-of-sale-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  # ===========================================================================
  # DATABASE - PostgreSQL 17
  # ===========================================================================
  database:
    image: postgres:17-alpine
    container_name: pos-database
    hostname: pos-database
    env_file: .env
    volumes:
      - pos-db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ===========================================================================
  # CACHE - Redis 8
  # ===========================================================================
  redis:
    image: redis:8-alpine
    container_name: pos-redis
    hostname: pos-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - pos-redis-data:/data
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ===========================================================================
  # BACKEND - FastAPI
  # ===========================================================================
  backend:
    image: ${IMAGE_BACKEND}
    container_name: pos-backend
    hostname: pos-backend
    env_file: .env
    environment:
      APP_ENV: production
      DEBUG: "false"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100m
    # Printer device passthrough — no privileged mode needed.
    #
    # /dev/bus/usb  → raw USB bus access (libusb, usbip)
    #
    # device_cgroup_rules grant cgroup write access by major number:
    #   c 6:*    /dev/lp*       — parallel-port / integrated printer (legacy)
    #   c 166:*  /dev/ttyACM*   — USB CDC-ACM serial printers
    #   c 180:*  /dev/usb/lp*   — USB thermal printers via usblp kernel module
    #   c 188:*  /dev/ttyUSB*   — USB-to-serial adapter printers
    #
    # For /dev/lp*, /dev/ttyUSB*, /dev/ttyACM*: add the specific node under
    # `devices:` once the path is known, OR use the host udev rule below to
    # symlink them into /dev/usb/ so the bind-mount picks them up automatically.
    #
    # Host udev rules (create /etc/udev/rules.d/99-pos-printer.rules):
    #   SUBSYSTEM=="usb", ATTRS{bInterfaceClass}=="07", GROUP="lp", MODE="0664"
    #   KERNEL=="lp[0-9]*", GROUP="lp", MODE="0664"
    #   KERNEL=="ttyUSB[0-9]*", GROUP="lp", MODE="0664"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - 'c 6:* rmw'
      - 'c 166:* rmw'
      - 'c 180:* rmw'
      - 'c 188:* rmw'
    group_add:
      - lp
    volumes:
      - /etc/machine-id:/etc/machine-id:ro  # stable host identity for license hardware binding
      # /dev/usb bind-mount with shared propagation so that /dev/usb/lp* nodes
      # created by udev AFTER container start are immediately visible inside.
      # create_host_path: true — no failure if /dev/usb doesn't exist yet.
      - type: bind
        source: /dev/usb
        target: /dev/usb
        bind:
          propagation: shared
          create_host_path: true
    security_opt:
      - no-new-privileges:true
    # Port not exposed: all traffic enters via the frontend Nginx on port 80
    networks:
      - pos-network
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    logging: *default-logging

  # ===========================================================================
  # FRONTEND - React PWA (Nginx, production build)
  # The Nginx inside this container proxies /api/ and /images/ to the
  # respective backend containers. No VITE_* variables needed — the frontend
  # code uses relative paths (/api/v1, /images) that work on any server.
  # ===========================================================================
  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: pos-frontend
    hostname: pos-frontend
    ports:
      - "${POS_PUBLIC_PORT}:80"
    networks:
      - pos-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      image-service:
        condition: service_healthy
    logging: *default-logging

  # ===========================================================================
  # IMAGE SERVICE - Upload & Thumbnails
  # ===========================================================================
  image-service:
    image: ${IMAGE_IMAGE_SERVICE}
    container_name: pos-image-service
    hostname: pos-image-service
    # Port not exposed: proxied via the frontend Nginx (/images/)
    volumes:
      - pos-image-data:/data/images
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ===========================================================================
  # UPDATER SIDECAR — System-Update über Admin-UI
  # ===========================================================================
  updater:
    image: ${IMAGE_UPDATER}
    container_name: pos-updater
    hostname: pos-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./.env:/app/deployment/.env:rw
      - ./docker-compose.prod.yml:/app/deployment/docker-compose.prod.yml:ro
      - ./updater-state:/app/state
      - ~/.docker/pos-auth.json:/root/.docker/config.json:ro
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-point-of-sale-prod}
      - DEPLOYMENT_REPO=${DEPLOYMENT_REPO}
      - MANAGED_SERVICES=backend,frontend,image-service
      - DEPLOYMENT_ENV=/app/deployment/.env
      - COMPOSE_FILE=/app/deployment/docker-compose.prod.yml
      - HOST_COMPOSE_PROJECT_DIR=${HOST_COMPOSE_PROJECT_DIR}
      - DRY_RUN=${DRY_RUN:-false}
      - DRY_RUN_NEXT_VERSION=${DRY_RUN_NEXT_VERSION:-}
      - CLEANUP_DELAY=${CLEANUP_DELAY:-86400}
      - CLEANUP_CHECK_INTERVAL=${CLEANUP_CHECK_INTERVAL:-3600}
      - POS_IMAGE_FILTER=${POS_IMAGE_FILTER:-pos-}
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    # KEIN ports: — Updater ist nur intern über pos-network erreichbar!
    security_opt:
      - no-new-privileges:true


  # ===========================================================================
  # BACKUP SIDECAR — Automatische PostgreSQL-Dumps + Web-UI (Port 8300)
  # ===========================================================================
  backup:
    image: ${IMAGE_BACKUP}
    container_name: pos-backup
    hostname: pos-backup
    env_file: .env
    ports:
      - "8300:8300"
    volumes:
      - ./backups:/backups
    networks:
      - pos-network
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  pos-db-data:
    name: pos-db-data
  pos-redis-data:
    name: pos-redis-data
  pos-image-data:
    name: pos-image-data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  pos-network:
    name: pos-network
